name: jcargo

services:
  db:
    image: postgres:15-alpine
    container_name: jcargo-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jcargo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jcargo_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-jcargo_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jcargo_user} -d ${POSTGRES_DB:-jcargo_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jcargo-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jcargo-backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jcargo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jcargo-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - jcargo-network

networks:
  jcargo-network:
    driver: bridge

volumes:
  postgres_data:
